[develop]
; 读取 develop 项目里的当前服务端配置，并从中取得 GameExe。
settings_path=..\develop\Data\Settings.ini

[window]
; 默认跟随 develop 项目指定的游戏进程。
; 留空 target_exe 时，会读取 settings_path 中 [Game] ServerProfile 对应的 [Server.*] GameExe。
target_exe=
target_title=
; elements.csv coordinates are measured against this window size.
reference_width=1040
reference_height=807
; Demo 只用于开发测试，启动时不自动运行。
auto_launch_demo=false
fallback_active_window=false

[lanes]
; Fast 范围 0-50ms。0ms 不会无限循环，会使用 fast_min_sleep_ms 做 CPU 保护。
fast_ms=16
fast_min_sleep_ms=2
fast_cpu_guard_ms=12

; Medium 范围 100-900ms。
medium_ms=250

; Slow 范围 1000-10000ms。
slow_ms=3000

[overlay]
enabled=true
always_on_top=true
click_through=true
; 透明度百分比，20-100。
opacity=55

[logging]
enabled=true
; 默认不记录每次稳定状态，避免日志刷屏。若需要调试可改为 true。
log_stable=false
